<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="School Homework Support System — A modern platform for students, teachers, and parents to manage homework, grading, and communication.">
  <meta name="theme-color" content="#0D47A1">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Homework Support">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>School Homework Support System</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Show a clean loading screen while Flutter boots */
    body {
      margin: 0;
      background-color: #0D47A1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    #loading {
      text-align: center;
      color: white;
    }
    #loading h2 {
      margin: 16px 0 8px;
      font-size: 22px;
      font-weight: 700;
    }
    #loading p {
      margin: 0;
      opacity: 0.75;
      font-size: 14px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>📚 Homework Support</h2>
    <p>Loading your school portal...</p>
  </div>
  <script>
    // Hide loading div when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
